<!DOCTYPE html>
<html lang="vi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>Game Idol Merge</title>
<style>
  body {
  margin: 0;
  background: #111;
  overflow: hidden;
  touch-action: none;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

canvas {
  background: #222;
  display: block;

  /* 🔥 full màn nhưng giữ tỉ lệ */
  width: 100vw;
  height: auto;
  max-height: 100vh;
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 🔥 THU NHỎ MÀN HÌNH
canvas.width = 280;
canvas.height = 470;


const GRAVITY = 0.8; // 🔥 rơi mượt, ít rung
const SCALE = 1;    // 🔥 kích thước chuẩn, không quá to// 🔥 giảm lại cho hợp màn nhỏ

let balls = [];
let gameOver = false;

const images = [
 "CONGB.1.jpg",
  "CONGB.10.jpg",
  "CONGB.2.jpg",
  "CONGB.3.jpg",
  "CONGB.4.jpg",
 "CONGB.5.jpg",
  "CONGB.6.jpg",
  "CONGB.7.jpg"
];

class Ball {
  constructor(x, y, level) {
    this.x = x;
    this.y = y;
    this.radius = (20 + level * 10) * SCALE;
    this.level = level;

    this.vy = 0;
    this.stable = false; // 🔥 thêm

    this.img = new Image();
    this.img.src = images[level % images.length];
  }

  update() {
  if (this.stable) return;

  this.vy += GRAVITY;
  this.y += this.vy;

  // 🔥 CHỐNG XUYÊN SÀN
  if (this.y + this.radius >= canvas.height) {
    this.y = canvas.height - this.radius; // khóa vị trí
    this.vy = 0;

    // 🔥 đứng luôn, không cho trôi tiếp
    this.stable = true;
  }
}
  draw() {
    ctx.save();
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.clip();
    //ctx.drawImage(this.img, this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
    // 🔥 Cắt ảnh thành hình vuông (center crop)
const minSize = Math.min(this.img.width, this.img.height);

const sx = (this.img.width - minSize) / 2;
const sy = (this.img.height - minSize) / 2;

ctx.drawImage(
  this.img,
  sx,
  sy,
  minSize,
  minSize,
  this.x - this.radius,
  this.y - this.radius,
  this.radius * 2,
  this.radius * 2
);
    ctx.restore();
  }
}

let currentBall = new Ball(canvas.width / 2, 50, 0);
let isTouching = false;
function getX(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;

  const clientX = e.touches
    ? e.touches[0].clientX
    : e.clientX;

  return (clientX - rect.left) * scaleX;
}

// PC
canvas.addEventListener("mousemove", (e) => {
  if (!gameOver) {
    currentBall.x = getX(e);

    // 🔥 chặn ra ngoài
    currentBall.x = Math.max(
      currentBall.radius,
      Math.min(canvas.width - currentBall.radius, currentBall.x)
    );
  }
});

// 📱 Mobile

canvas.addEventListener("touchmove", (e) => {
  if (!gameOver && isTouching) {
    const x = getX(e);

    currentBall.x = Math.max(
      currentBall.radius,
      Math.min(canvas.width - currentBall.radius, x)
    );
  }
  e.preventDefault();
}, { passive: false });
// PC
canvas.addEventListener("mousedown", (e) => {
  if (gameOver) return;

  currentBall.x = getX(e); // 🔥 fix lệch vị trí

  balls.push(currentBall);
  currentBall = new Ball(canvas.width / 2, 50, 0);
});

// 📱 Mobile
canvas.addEventListener("touchend", () => {
  if (gameOver) return;

  if (isTouching) {
    balls.push(currentBall);
    currentBall = new Ball(canvas.width / 2, 50, 0);
  }

  isTouching = false;
});
canvas.addEventListener("touchstart", (e) => {
  if (gameOver) return;

  isTouching = true;

  const x = getX(e);

  // 🔥 di chuyển ngay khi chạm
  currentBall.x = Math.max(
    currentBall.radius,
    Math.min(canvas.width - currentBall.radius, x)
  );

  e.preventDefault();
}, { passive: false });
function checkMerge() {
  for (let i = 0; i < balls.length; i++) {
    for (let j = i + 1; j < balls.length; j++) {
      let b1 = balls[i];
      let b2 = balls[j];

      let dx = b1.x - b2.x;
      let dy = b1.y - b2.y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < b1.radius + b2.radius && b1.level === b2.level) {
        let newBall = new Ball(
          (b1.x + b2.x) / 2,
          (b1.y + b2.y) / 2,
          b1.level + 1
        );
        newBall.stable = false; 
        balls.splice(j, 1);
        balls.splice(i, 1);
        balls.push(newBall);

        if (newBall.level >= 7) {
          alert("🎉 Bạn thắng!");
          gameOver = true;
        }

        return;
      }
    }
  }
}

function checkGameOver() {
  for (let b of balls) {
    if (b.y - b.radius <= 0) {
      gameOver = true;
      alert("💀 Game Over!");
      return;
    }
  }
}
function resolveCollision() {
  for (let i = 0; i < balls.length; i++) {
    for (let j = i + 1; j < balls.length; j++) {

      let b1 = balls[i];
      let b2 = balls[j];

      let dx = b2.x - b1.x;
      let dy = b2.y - b1.y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      let minDist = b1.radius + b2.radius;

      if (dist < minDist && dist > 0) {

        let overlap = minDist - dist;
        let nx = dx / dist;
        let ny = dy / dist;

        // 🔥 đẩy rất nhẹ thôi (không văng lung tung)
        let push = overlap * 0.3;

        b1.x -= nx * push;
        b1.y -= ny * push;
        b2.x += nx * push;
        b2.y += ny * push;

        // 🔥 nếu gần đứng yên thì cho đứng luôn
        if (Math.abs(b1.vy) < 0.5) b1.stable = true;
        if (Math.abs(b2.vy) < 0.5) b2.stable = true;
      }
    }
  }
}
/*function resizeCanvas() {
  const ratio = canvas.height / canvas.width;

  const displayWidth = 280;
  const displayHeight = displayWidth * ratio;

  canvas.style.width = displayWidth + "px";
  canvas.style.height = displayHeight + "px";
}*/
function resizeCanvas() {
  const ratio = canvas.height / canvas.width;

  let w = window.innerWidth;
  let h = w * ratio;

  if (h > window.innerHeight) {
    h = window.innerHeight;
    w = h / ratio;
  }

  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();
resizeCanvas();
window.addEventListener("resize", resizeCanvas);
function keepInBounds(ball) {
  // chặn trái
  if (ball.x - ball.radius < 0) {
    ball.x = ball.radius;
  }

  // chặn phải
  if (ball.x + ball.radius > canvas.width) {
    ball.x = canvas.width - ball.radius;
  }
}
function resizeCanvas() {
  const maxWidth = Math.min(window.innerWidth, 400);
  const scale = maxWidth / 350;

  canvas.style.width = maxWidth + "px";
  canvas.style.height = 590 * scale + "px";
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!gameOver) {
    currentBall.draw();
  }

  balls.forEach(b => {
  b.update();

  // 🔥 khóa đáy lần nữa (backup chống bug)
  if (b.y + b.radius > canvas.height) {
    b.y = canvas.height - b.radius;
    b.vy = 0;
    b.stable = true;
  }

  keepInBounds(b);
  b.draw();
});
  resolveCollision();
  balls.forEach(b => {
  if (b.y + b.radius > canvas.height) {
    b.y = canvas.height - b.radius;
    b.vy = 0;
    b.stable = true;
  }
});
  //balls.forEach(b => keepInBounds(b));
  checkMerge();
  checkGameOver();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
